name: Verify Codex

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  verify-python:
    name: Python verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run Python verifier
        run: python3 tools/python/verify_codex.py codex/codex.txt
      - name: Run test suite
        run: |
          pip install pytest
          python3 -m pytest tests/python/ -v

  verify-node:
    name: Node verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Run Node verifier
        run: node tools/node/verify-codex.mjs codex/codex.txt

  verify-rust:
    name: Rust verifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Rust verifier
        run: cd tools/rust && cargo build --release
      - name: Run Rust verifier
        run: cd tools/rust && cargo run --release -- ../../codex/codex.txt

  verify-sha256:
    name: Standard sha256sum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Compute hash with coreutils
        run: |
          EXPECTED="feaa46b4147d4e023cdd3fd59c051d063e8ec654ee7b38a481dcd5e4c781859b"
          ACTUAL=$(sha256sum codex/codex.txt | awk '{print $1}')
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "FAIL: SHA-256 mismatch"
            exit 1
          fi
          echo "PASS: SHA-256 matches canonical"

  verify-openssl:
    name: OpenSSL digest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Compute hash with openssl
        run: |
          EXPECTED="feaa46b4147d4e023cdd3fd59c051d063e8ec654ee7b38a481dcd5e4c781859b"
          ACTUAL=$(openssl dgst -sha256 codex/codex.txt | awk '{print $NF}')
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          [ "$EXPECTED" = "$ACTUAL" ] || exit 1
          echo "PASS: openssl confirms canonical hash"

  validate-manifest:
    name: Manifest schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Validate manifest
        run: |
          python3 -c "
          import json
          from jsonschema import validate, Draft202012Validator
          schema = json.load(open('manifest/manifest.schema.json'))
          manifest = json.load(open('manifest/manifest.json'))
          Draft202012Validator.check_schema(schema)
          validate(manifest, schema)
          print('PASS: manifest validates against schema')
          "

  verify-narrative-hashes:
    name: Narrative hash claims
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify narrative SHA-256 claims match codex
        run: |
          echo "Computing canonical codex hash..."
          CANONICAL=$(sha256sum codex/codex.txt | awk '{print $1}')
          echo "Canonical: $CANONICAL"
          echo ""
          FAILURES=0
          for f in narrative/*.md; do
            [ "$f" = "narrative/README.md" ] && continue
            echo "--- $f ---"
            HASHES=$(grep -oP '[a-f0-9]{64}' "$f" || true)
            for h in $HASHES; do
              if [ "$h" = "$CANONICAL" ]; then
                echo "  OK: $h"
              else
                echo "  MISMATCH: $h (expected $CANONICAL)"
                FAILURES=$((FAILURES + 1))
              fi
            done
          done
          if [ $FAILURES -gt 0 ]; then
            echo ""
            echo "FAIL: $FAILURES hash mismatch(es)"
            exit 1
          fi
          echo ""
          echo "PASS: All narrative hash claims match canonical Codex"

      - name: Verify narrative image hashes
        if: hashFiles('narrative/images/HASHES.txt') != ''
        run: |
          echo "Verifying narrative image integrity..."
          cd narrative/images
          sha256sum -c HASHES.txt --strict --quiet
          echo "PASS: All narrative image hashes match pinned values"

  cross-implementation-agreement:
    name: All verifiers agree
    runs-on: ubuntu-latest
    needs: [verify-python, verify-node, verify-rust, verify-sha256, verify-openssl, validate-manifest, verify-narrative-hashes]
    steps:
      - name: Cross-implementation success
        run: |
          echo "All 5 verifiers passed independently:"
          echo "  - Python (hashlib)"
          echo "  - Node (crypto)"
          echo "  - Rust (ring + blake2)"
          echo "  - coreutils sha256sum"
          echo "  - openssl dgst -sha256"
          echo ""
          echo "Codex is CONSTITUTIONAL."
